<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Phone Timelapse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #fff;
      font-family: -apple-system, sans-serif;
    }

    #camera {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #arm-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 48px;
      font-size: 22px;
      font-weight: 600;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      z-index: 10;
    }

    #status {
      display: none;
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      font-size: 16px;
      text-align: center;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 10;
    }

    #portrait-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      font-size: 28px;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      z-index: 100;
    }

    @media (orientation: portrait) {
      #portrait-overlay {
        display: flex;
      }
    }
  </style>
</head>
<body>

  <!-- nosleep.mp4: 2×2px H.264 MP4 generated by ffmpeg; keeps iOS screen awake via silent looping video -->
  <video id="nosleep" autoplay loop muted playsinline src="/nosleep.mp4"
         style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></video>
  <video id="camera" autoplay muted playsinline></video>
  <button id="arm-btn">Arm Camera</button>
  <div id="status"></div>
  <div id="portrait-overlay">↺ Rotate your phone to landscape</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let stream = null;

    function showStatus(message) {
      const el = document.getElementById('status');
      el.textContent = message;
      el.style.display = 'block';
    }

    async function armCamera() {
      // Must be before any await — iOS Safari only allows video.play() in a sync user-gesture context
      document.getElementById('nosleep').play().catch((err) => console.warn('NoSleep play failed:', err));

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showStatus('Camera not available — page must be loaded over HTTPS. See the README for mkcert setup instructions.');
        return;
      }
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false,
        });
        const video = document.getElementById('camera');
        video.srcObject = stream;
        await video.play().catch(() => {});
        document.getElementById('arm-btn').style.display = 'none';
        video.style.display = 'block';
      } catch (err) {
        showStatus(`Camera access denied. Please allow camera permission in Settings and reload. (${err.message})`);
      }
    }

    document.getElementById('arm-btn').addEventListener('click', armCamera);

    const socket = io();

    socket.on('connect', () => {
      console.log('Phone connected', socket.id);
      showStatus('Waiting for session to start…');
    });

    socket.on('disconnect', () => {
      console.log('Phone disconnected');
    });
  </script>
</body>
</html>
