<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Phone Timelapse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      color: #fff;
      font-family: -apple-system, sans-serif;
    }

    #camera {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #arm-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 48px;
      font-size: 22px;
      font-weight: 600;
      background: #fff;
      color: #111;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      z-index: 10;
    }

    /* Status overlay — shown after arming */
    #status-overlay {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      background: rgba(0,0,0,0.5);
      z-index: 10;
    }

    #status-overlay.visible { display: block; }

    /* Waiting message (shown while session is idle) */
    #waiting-msg {
      font-size: 16px;
      text-align: center;
    }

    /* Live capture UI (shown while session is running) */
    #capture-ui {
      display: none;
    }

    #capture-ui.visible { display: flex; }

    #capture-ui {
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    /* Connection dot */
    #status-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #888;
    }

    #status-dot.connected    { background: #4caf50; }
    #status-dot.disconnected { background: #f44336; }

    /* Countdown and last-captured */
    #countdown, #last-captured {
      font-size: 15px;
      white-space: nowrap;
    }

    /* Stop button */
    #stop-btn {
      padding: 8px 18px;
      font-size: 15px;
      font-weight: 600;
      background: #f44336;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      flex-shrink: 0;
    }

    #stop-btn:disabled { opacity: 0.5; }

    /* Frame saved overlay */
    #frame-saved-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      font-weight: 600;
      background: rgba(0,0,0,0.6);
      padding: 12px 28px;
      border-radius: 10px;
      opacity: 0;
      transition: opacity 1.5s ease;
      pointer-events: none;
      z-index: 20;
    }

    #frame-saved-overlay.visible {
      opacity: 1;
      transition: none;
    }

    /* Portrait overlay */
    #portrait-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      color: #fff;
      font-size: 28px;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      z-index: 100;
    }

    @media (orientation: portrait) {
      #portrait-overlay { display: flex; }
    }
  </style>
</head>
<body>

  <!-- nosleep.mp4: 2×2px H.264 MP4 generated by ffmpeg; keeps iOS screen awake via silent looping video -->
  <video id="nosleep" autoplay loop muted playsinline src="/nosleep.mp4"
         style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></video>
  <video id="camera" autoplay muted playsinline></video>
  <canvas id="capture-canvas" style="display:none;"></canvas>

  <button id="arm-btn">Arm Camera</button>

  <div id="status-overlay">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
      <span id="status-dot"></span>
      <span id="waiting-msg">Waiting for session to start…</span>
    </div>
    <div id="capture-ui">
      <span id="countdown">--</span>
      <span id="last-captured">--</span>
      <button id="stop-btn">Stop</button>
    </div>
  </div>

  <div id="frame-saved-overlay">Frame saved</div>
  <div id="portrait-overlay">↺ Rotate your phone to landscape</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let stream    = null;
    let capturing = false;

    let sessionInterval  = null;
    let countdown        = null;
    let countdownTimer   = null;
    let lastCapturedAt   = null;

    const video  = document.getElementById('camera');
    const canvas = document.getElementById('capture-canvas');
    const ctx    = canvas.getContext('2d');

    const statusDot          = document.getElementById('status-dot');
    const countdownEl        = document.getElementById('countdown');
    const lastCapturedEl     = document.getElementById('last-captured');
    const frameSavedOverlay  = document.getElementById('frame-saved-overlay');
    const stopBtn            = document.getElementById('stop-btn');
    const waitingMsg         = document.getElementById('waiting-msg');
    const captureUi          = document.getElementById('capture-ui');
    const statusOverlay      = document.getElementById('status-overlay');

    function showStatus() {
      statusOverlay.classList.add('visible');
    }

    function showWaiting() {
      waitingMsg.style.display = 'block';
      captureUi.classList.remove('visible');
    }

    function showCaptureUi() {
      waitingMsg.style.display = 'none';
      captureUi.classList.add('visible');
      stopBtn.disabled = false;
    }

    function flashFrameSaved() {
      frameSavedOverlay.classList.remove('visible');
      void frameSavedOverlay.offsetWidth; // force reflow to restart transition
      frameSavedOverlay.classList.add('visible');
      setTimeout(() => frameSavedOverlay.classList.remove('visible'), 50);
    }

    function startCountdown(seconds) {
      clearInterval(countdownTimer);
      countdown = seconds;
      countdownEl.textContent = `Next: ${countdown}s`;
      countdownTimer = setInterval(() => {
        countdown = Math.max(0, countdown - 1);
        countdownEl.textContent = `Next: ${countdown}s`;
      }, 1000);
    }

    async function armCamera() {
      // Must be before any await — iOS Safari only allows video.play() in a sync user-gesture context
      document.getElementById('nosleep').play().catch((err) => console.warn('NoSleep play failed:', err));

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        waitingMsg.textContent = 'Camera not available — page must be loaded over HTTPS. See the README for mkcert setup instructions.';
        showStatus();
        return;
      }
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false,
        });
        video.srcObject = stream;
        await video.play().catch(() => {});
        document.getElementById('arm-btn').style.display = 'none';
        video.style.display = 'block';
        showStatus();
        showWaiting();
      } catch (err) {
        waitingMsg.textContent = `Camera access denied. Please allow camera permission in Settings and reload. (${err.message})`;
        showStatus();
      }
    }

    document.getElementById('arm-btn').addEventListener('click', armCamera);

    stopBtn.addEventListener('click', () => {
      stopBtn.disabled = true;
      socket.emit('stop-session');
    });

    const socket = io();

    socket.on('connect', () => {
      console.log('Phone connected', socket.id);
      statusDot.className = 'connected';
    });

    socket.on('disconnect', () => {
      console.log('Phone disconnected');
      statusDot.className = 'disconnected';
    });

    socket.on('status-update', (session) => {
      if (session.interval) sessionInterval = session.interval;
      if (session.status === 'idle') {
        showWaiting();
      } else if (session.status === 'running') {
        showCaptureUi();
      }
    });

    socket.on('session-started', (session) => {
      if (session.interval) sessionInterval = session.interval;
      showCaptureUi();
    });

    socket.on('session-ended', () => {
      clearInterval(countdownTimer);
      countdownEl.textContent = '--';
      showWaiting();
    });

    socket.on('capture', ({ format }) => {
      // Skip capture if phone is in portrait orientation
      if (window.matchMedia('(orientation: portrait)').matches) return;
      if (capturing) return;
      if (video.readyState < 2) return;

      if (sessionInterval) startCountdown(sessionInterval);

      capturing = true;
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      const mimeType = format === 'jpg' ? 'image/jpeg' : 'image/png';
      const quality  = format === 'jpg' ? 0.85 : undefined;

      const onBlob = (blob) => {
        if (!blob) {
          console.error('toBlob returned null');
          capturing = false;
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          socket.emit('frame', reader.result);
          capturing = false;
        };
        reader.readAsArrayBuffer(blob);
      };

      if (quality !== undefined) {
        canvas.toBlob(onBlob, mimeType, quality);
      } else {
        canvas.toBlob(onBlob, mimeType);
      }
    });

    socket.on('frame-ack', ({ timestamp }) => {
      const t = new Date(timestamp);
      const hms = t.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      lastCapturedEl.textContent = `Last: ${hms}`;
      flashFrameSaved();
    });
  </script>
</body>
</html>
